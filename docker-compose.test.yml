services:

  # --- Mock Batocera Machine (SSH-Server + fake filesystem) ---
  batocera-mock:
    build:
      context: ./tests/batocera-mock
    container_name: batocera-mock
    hostname: batocera
    ports:
      - "2299:22"     # SSH: localhost:2299 → Batocera mock
    restart: unless-stopped

  # --- Dashboard: REMOTE mode (läuft auf Mac, verbindet per SSH zu Mock) ---
  dashboard-remote:
    build: .
    container_name: dashboard-remote
    ports:
      - "8091:8080"   # http://localhost:8091
    environment:
      - BATOCERA_HOST=batocera-mock
      - BATOCERA_PORT=22
      - BATOCERA_USER=root
      - BATOCERA_PASS=linux
      - PORT=8080
      - MODE=remote
    depends_on:
      - batocera-mock
    restart: unless-stopped

  # --- Dashboard: NATIVE mode (läuft direkt auf der "Batocera"-Maschine) ---
  dashboard-native:
    build:
      context: ./batocera-native
    container_name: dashboard-native
    ports:
      - "8092:8989"   # http://localhost:8092
    restart: unless-stopped
