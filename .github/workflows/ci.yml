name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Build & start test stack
        run: docker compose -f docker-compose.test.yml up --build -d

      - name: Wait for remote dashboard
        run: |
          echo "Waiting for dashboard-remote..."
          timeout 60 bash -c 'until curl -sf http://localhost:8091/health; do sleep 2; done'

      - name: Wait for native dashboard
        run: |
          echo "Waiting for dashboard-native..."
          timeout 60 bash -c 'until curl -sf http://localhost:8092/health; do sleep 2; done'

      - name: Run API tests
        run: python3 tests/run_tests.py

      - name: Show container logs on failure
        if: failure()
        run: |
          echo "=== dashboard-remote ==="
          docker logs dashboard-remote --tail 50
          echo "=== dashboard-native ==="
          docker logs dashboard-native --tail 50
          echo "=== batocera-mock ==="
          docker logs batocera-mock --tail 30

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.test.yml down

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: tests/e2e/package.json

      - name: Install Playwright + deps
        working-directory: tests/e2e
        run: npm ci && npx playwright install --with-deps chromium

      - name: Build & start test stack
        run: docker compose -f docker-compose.test.yml up --build -d

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -sf http://localhost:8091/health; do sleep 2; done'
          timeout 60 bash -c 'until curl -sf http://localhost:8092/health; do sleep 2; done'

      - name: Run Playwright tests
        working-directory: tests/e2e
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          retention-days: 7

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.test.yml down

  syntax-check:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python syntax check — server.py (remote)
        run: python3 -m py_compile server.py && echo "server.py OK"

      - name: Python syntax check — server.py (native)
        run: python3 -m py_compile batocera-native/server.py && echo "native/server.py OK"

      - name: Validate docker-compose files
        run: |
          docker compose -f docker-compose.test.yml config --quiet && echo "docker-compose.test.yml OK"
          if [ -f docker-compose.yml ]; then
            docker compose -f docker-compose.yml config --quiet && echo "docker-compose.yml OK"
          else
            echo "docker-compose.yml not present (skipping)"
          fi
